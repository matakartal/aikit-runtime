name: publish

# Registry publishing is PREPARED but intentionally DISABLED. Dispatching this workflow today
# fails at the guard job. Enabling it is a deliberate, multi-step decision documented in
# docs/RELEASE.md ("Registry publishing preparation"): set the REGISTRY_PUBLISH_ENABLED repo
# variable, create the registry-publish environment with a required reviewer, configure the
# registry-side trusted publishers, and remove the publish=false / "private": true manifest
# guards. Until every step is done, this workflow is a documented refusal, not a release path.

on:
  workflow_dispatch:
    inputs:
      registry:
        description: Registry to publish
        required: true
        type: choice
        options: [crates, pypi, npm]
      acknowledge:
        description: Type PUBLISH to confirm this is a deliberate registry publication
        required: true
        type: string
      artifacts_run_id:
        description: release.yml run id supplying the built wheel/npm bundle (pypi/npm only)
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: registry-publish
  cancel-in-progress: false

jobs:
  guard:
    name: Publishing is prepared but disabled
    runs-on: ubuntu-latest
    steps:
      - name: Enforce the enablement checklist in docs/RELEASE.md
        env:
          PUBLISH_ENABLED: ${{ vars.REGISTRY_PUBLISH_ENABLED }}
          ACKNOWLEDGE: ${{ inputs.acknowledge }}
          SOURCE_EVENT: ${{ github.event_name }}
          SOURCE_REF: ${{ github.ref }}
          SOURCE_REF_PROTECTED: ${{ github.ref_protected }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$PUBLISH_ENABLED" != "true" ] || [ "$ACKNOWLEDGE" != "PUBLISH" ]; then
            echo "Registry publishing is intentionally disabled; see docs/RELEASE.md." >&2
            exit 1
          fi
          test "$SOURCE_EVENT" = workflow_dispatch || {
            echo "registry publishing requires an explicit workflow_dispatch event" >&2
            exit 1
          }
          test "$SOURCE_REF_PROTECTED" = true || {
            echo "registry publishing requires a protected source ref" >&2
            exit 1
          }
          test "$SOURCE_REF" = "refs/heads/$DEFAULT_BRANCH" || {
            echo "registry publishing is restricted to the protected default branch" >&2
            exit 1
          }

  crates:
    name: Publish Rust crates (crates.io trusted publishing)
    if: inputs.registry == 'crates'
    needs: guard
    runs-on: ubuntu-latest
    environment: registry-publish
    permissions:
      contents: read
      id-token: write # OIDC exchange for a short-lived crates.io token; no stored secret
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: "1.97.1"
      - name: Candidate gates must pass on the exact publish source
        run: ./scripts/release-check.sh --candidate
      - name: Refuse OIDC until both crate names have an owner bootstrap
        run: ./scripts/require-crates-oidc-bootstrap.sh aikit-runtime-core aikit-runtime
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth
      - name: Publish the core, then the facade once Cargo resolves the exact registry artifact
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          version="$(awk -F'"' '/^version = "/ { print $2; exit }' Cargo.toml)"
          cargo package -p aikit-runtime-core --locked
          core_artifact="target/package/aikit-runtime-core-$version.crate"
          ./scripts/publish-crate-idempotent.sh \
            aikit-runtime-core "$version" "$core_artifact" -- -p aikit-runtime-core --locked
          ./scripts/wait-crate-version.sh aikit-runtime-core "$version" "$core_artifact"
          cargo package -p aikit-runtime --locked
          facade_artifact="target/package/aikit-runtime-$version.crate"
          ./scripts/publish-crate-idempotent.sh \
            aikit-runtime "$version" "$facade_artifact" -- -p aikit-runtime --locked

  pypi:
    name: Publish Python wheels (PyPI trusted publisher)
    if: inputs.registry == 'pypi'
    needs: guard
    runs-on: ubuntu-latest
    environment: registry-publish
    permissions:
      actions: read
      attestations: read
      contents: read
      id-token: write # PyPI trusted-publisher OIDC
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Download and verify the exact assembled release bundle
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ inputs.artifacts_run_id }}
        run: |
          test -n "$RUN_ID" || { echo "artifacts_run_id is required for pypi" >&2; exit 1; }
          ./scripts/validate-release-run.sh \
            "$RUN_ID" "$GITHUB_SHA" "$GITHUB_REF" "$GITHUB_REPOSITORY"
          gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" \
            --name source-distribution-bundle --dir dist/release
          ./scripts/prepare-publish-bundle.sh pypi dist/release dist/wheels
          signer_workflow="${GITHUB_SERVER_URL#https://}/$GITHUB_REPOSITORY/.github/workflows/release.yml"
          find dist/wheels -type f -name '*.whl' -print0 \
            | xargs -0 -n 1 gh attestation verify \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$signer_workflow" \
              --source-digest "$GITHUB_SHA" \
              --source-ref "$GITHUB_REF"
          ls -l dist/wheels
      - name: Skip exact PyPI files and reject filename checksum conflicts
        id: pypi_plan
        run: |
          ./scripts/prepare-pypi-publish.py dist/wheels dist/wheels-to-publish
          if find dist/wheels-to-publish -type f -name '*.whl' -print -quit | grep -q .; then
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        if: steps.pypi_plan.outputs.has_packages == 'true'
        with:
          packages-dir: dist/wheels-to-publish

  npm:
    name: Publish npm packages (npm trusted publishing)
    if: inputs.registry == 'npm'
    needs: guard
    runs-on: ubuntu-latest
    environment: registry-publish
    permissions:
      actions: read
      attestations: read
      contents: read
      id-token: write # npm trusted publishing (provenance is automatic with npm >= 11.5.1)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - name: Refuse trusted publishing until all npm packages have an owner bootstrap
        run: |
          ./scripts/require-npm-oidc-bootstrap.sh \
            aikit-runtime \
            aikit-runtime-darwin-arm64 \
            aikit-runtime-darwin-x64 \
            aikit-runtime-linux-arm64-gnu \
            aikit-runtime-linux-x64-gnu \
            aikit-runtime-win32-x64-msvc
      - name: Download and verify the exact assembled release bundle
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ inputs.artifacts_run_id }}
        run: |
          test -n "$RUN_ID" || { echo "artifacts_run_id is required for npm" >&2; exit 1; }
          ./scripts/validate-release-run.sh \
            "$RUN_ID" "$GITHUB_SHA" "$GITHUB_REF" "$GITHUB_REPOSITORY"
          gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" \
            --name source-distribution-bundle --dir dist/release
          ./scripts/prepare-publish-bundle.sh npm dist/release dist/npm
          signer_workflow="${GITHUB_SERVER_URL#https://}/$GITHUB_REPOSITORY/.github/workflows/release.yml"
          find dist/npm -type f -name '*.tgz' -print0 \
            | xargs -0 -n 1 gh attestation verify \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$signer_workflow" \
              --source-digest "$GITHUB_SHA" \
              --source-ref "$GITHUB_REF"
          find dist/npm -name '*.tgz' | sort
      - name: Publish platform packages first, then the wrapper
        run: |
          wrapper=""
          version="$(node -p "require('./crates/aikit-node/package.json').version")"
          tag="$(./scripts/npm-release-tag.sh "$version")"
          while IFS= read -r tarball; do
            case "$tarball" in
              *aikit-runtime-[0-9]*.tgz) wrapper="$tarball" ;;
              *) ./scripts/publish-npm-idempotent.sh "$tarball" "$tag" ;;
            esac
          done < <(find dist/npm -name '*.tgz' | sort)
          test -n "$wrapper" || { echo "wrapper tarball not found" >&2; exit 1; }
          ./scripts/publish-npm-idempotent.sh "$wrapper" "$tag"
