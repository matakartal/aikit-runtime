name: release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  source:
    name: Source packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: "1.97.1"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
      - name: Candidate invariants
        run: ./scripts/release-check.sh --candidate
      - name: Package Rust core and facade file sets
        run: |
          mkdir -p dist/source
          cargo package -p aikit-runtime-core --locked
          cp target/package/aikit-runtime-core-*.crate dist/source/
          # The facade depends on the sibling core package. Record its source file set without
          # contacting or publishing to an external registry.
          cargo package -p aikit-runtime --allow-dirty --list --locked > dist/source/aikit-runtime-files.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: source-packages
          path: dist/source
          if-no-files-found: error

  node-native:
    name: Node ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            native: target/release/libaikit_node.dylib
          - os: macos-15-intel
            target: darwin-x64
            native: target/release/libaikit_node.dylib
          - os: windows-latest
            target: win32-x64-msvc
            native: target/release/aikit_node.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: "1.97.1"
      - name: Build native addon
        run: cargo build -p aikit-node --release --locked
      - name: Verify runner and native architecture
        shell: bash
        run: ./scripts/release-check.sh --assert-native "${{ matrix.target }}" "${{ matrix.native }}"
      - name: Verify installed optional-package layout
        shell: bash
        run: ./scripts/test-node-package-layout.sh "${{ matrix.target }}" "${{ matrix.native }}"
      - name: Pack platform package
        shell: bash
        run: |
          ./scripts/stage-node-platform.sh "${{ matrix.target }}" "${{ matrix.native }}"
          mkdir -p dist/npm-pack
          npm pack --pack-destination dist/npm-pack "./dist/npm/${{ matrix.target }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: node-${{ matrix.target }}
          path: dist/npm-pack/*.tgz
          if-no-files-found: error

  node-linux:
    name: Node ${{ matrix.target }} (manylinux_2_28)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64-gnu
            container: quay.io/pypa/manylinux_2_28_x86_64@sha256:a61875a2f84cab7df8de222ff12cabc08ff86eb4ad402ac90ba7bdaed9600cca
          - os: ubuntu-24.04-arm
            target: linux-arm64-gnu
            container: quay.io/pypa/manylinux_2_28_aarch64@sha256:162c81dfd3efc710732a571717d3c916a6945ebf279e879ddee3243af96fe46f
    runs-on: ${{ matrix.os }}
    container:
      image: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: "1.97.1"
      - name: Build native addon against glibc 2.28
        run: cargo build -p aikit-node --release --locked
      - name: Verify runner and native architecture
        run: >-
          ./scripts/release-check.sh --assert-native
          "${{ matrix.target }}" target/release/libaikit_node.so
      - name: Verify installed optional-package layout
        run: ./scripts/test-node-package-layout.sh "${{ matrix.target }}" target/release/libaikit_node.so
      - name: Pack platform package
        run: |
          ./scripts/stage-node-platform.sh "${{ matrix.target }}" target/release/libaikit_node.so
          mkdir -p dist/npm-pack
          npm pack --pack-destination dist/npm-pack "./dist/npm/${{ matrix.target }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: node-${{ matrix.target }}
          path: dist/npm-pack/*.tgz
          if-no-files-found: error

  node-wrapper:
    name: Node platform-selecting wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
      - name: Assert wrapper contains no host binary
        run: |
          mkdir -p dist/npm-pack
          npm pack --pack-destination dist/npm-pack ./crates/aikit-node
          tar -tzf dist/npm-pack/*.tgz | grep -Fq package/index.js
          tar -tzf dist/npm-pack/*.tgz | grep -Fq package/index.d.ts
          if tar -tzf dist/npm-pack/*.tgz | grep -Eq '\.node$'; then
            echo 'root wrapper embeds a host-specific native addon' >&2
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: node-wrapper
          path: dist/npm-pack/*.tgz
          if-no-files-found: error

  python-wheel:
    name: Python wheel (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos-arm64
          - os: macos-15-intel
            target: macos-x64
          - os: windows-latest
            target: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.9"
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: "1.97.1"
      - name: Build ABI3 wheel
        run: |
          python -m pip install --disable-pip-version-check "maturin==1.14.1"
          python -m maturin build --manifest-path crates/aikit-py/Cargo.toml --release --locked --out dist/python
      - name: Verify wheel platform tag
        shell: bash
        run: PYTHON=python ./scripts/release-check.sh --assert-wheel "${{ matrix.target }}" dist/python
      - name: Install and import wheel
        shell: bash
        run: |
          python -m pip install --force-reinstall dist/python/*.whl
          expected_version="$(cargo metadata --no-deps --format-version 1 | python -c 'import json,sys; print(next(p["version"] for p in json.load(sys.stdin)["packages"] if p["name"] == "aikit-py"))')"
          AIKIT_EXPECTED_VERSION="$expected_version" python -c "import os, aikit; assert aikit.__version__ == os.environ['AIKIT_EXPECTED_VERSION']"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-${{ matrix.target }}
          path: dist/python/*.whl
          if-no-files-found: error

  python-linux:
    name: Python wheel (${{ matrix.target }}, manylinux_2_28)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            container: quay.io/pypa/manylinux_2_28_x86_64@sha256:a61875a2f84cab7df8de222ff12cabc08ff86eb4ad402ac90ba7bdaed9600cca
          - os: ubuntu-24.04-arm
            target: linux-arm64
            container: quay.io/pypa/manylinux_2_28_aarch64@sha256:162c81dfd3efc710732a571717d3c916a6945ebf279e879ddee3243af96fe46f
    runs-on: ${{ matrix.os }}
    container:
      image: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: "1.97.1"
      - name: Build ABI3 wheel against glibc 2.28
        run: |
          PYTHON=/opt/python/cp39-cp39/bin/python
          "$PYTHON" -m pip install --disable-pip-version-check "maturin==1.14.1"
          "$PYTHON" -m maturin build --manifest-path crates/aikit-py/Cargo.toml --release --locked --compatibility manylinux_2_28 --out dist/python
      - name: Verify wheel platform tag
        run: >-
          PYTHON=/opt/python/cp39-cp39/bin/python
          ./scripts/release-check.sh --assert-wheel "${{ matrix.target }}" dist/python
      - name: Install and import wheel
        run: |
          PYTHON=/opt/python/cp39-cp39/bin/python
          "$PYTHON" -m pip install --force-reinstall dist/python/*.whl
          expected_version="$(cargo metadata --no-deps --format-version 1 | "$PYTHON" -c 'import json,sys; print(next(p["version"] for p in json.load(sys.stdin)["packages"] if p["name"] == "aikit-py"))')"
          AIKIT_EXPECTED_VERSION="$expected_version" "$PYTHON" -c "import os, aikit; assert aikit.__version__ == os.environ['AIKIT_EXPECTED_VERSION']"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-${{ matrix.target }}
          path: dist/python/*.whl
          if-no-files-found: error

  assemble:
    name: Assemble and attest source-distribution bundle
    needs: [source, node-linux, node-native, node-wrapper, python-linux, python-wheel]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/release
      - name: Verify complete target matrix and hash artifacts
        run: |
          ./scripts/release-check.sh --assert-bundle dist/release
          (
            cd dist/release
            checksum_file="../SHA256SUMS.tmp"
            trap 'rm -f "$checksum_file"' EXIT
            find . -type f ! -name SHA256SUMS -print0 \
              | sort -z \
              | xargs -0 sha256sum > "$checksum_file"
            mv "$checksum_file" SHA256SUMS
            trap - EXIT
            sha256sum -c SHA256SUMS
          )
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: |
            dist/release/**/*.whl
            dist/release/**/*.tgz
            dist/release/**/*.crate
            dist/release/SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: source-distribution-bundle
          path: dist/release
          if-no-files-found: error
