name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  source:
    name: Source packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Candidate invariants
        run: ./scripts/release-check.sh --candidate
      - name: Package Rust core and facade file sets
        run: |
          mkdir -p dist/source
          cargo package -p aikit-runtime-core --locked
          cp target/package/aikit-runtime-core-*.crate dist/source/
          # The facade cannot be packaged until its exact core version is visible on crates.io.
          # Record the final file set here; the publish job packages and attests it after core.
          cargo package -p aikit-runtime --allow-dirty --list --locked > dist/source/aikit-runtime-files.txt
      - uses: actions/upload-artifact@v7
        with:
          name: source-packages
          path: dist/source
          if-no-files-found: error

  node-native:
    name: Node ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64-gnu
            native: target/release/libaikit_node.so
          - os: ubuntu-24.04-arm
            target: linux-arm64-gnu
            native: target/release/libaikit_node.so
          - os: macos-latest
            target: darwin-arm64
            native: target/release/libaikit_node.dylib
          - os: macos-15-intel
            target: darwin-x64
            native: target/release/libaikit_node.dylib
          - os: windows-latest
            target: win32-x64-msvc
            native: target/release/aikit_node.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build native addon
        run: cargo build -p aikit-node --release --locked
      - name: Verify installed optional-package layout
        shell: bash
        run: ./scripts/test-node-package-layout.sh "${{ matrix.target }}" "${{ matrix.native }}"
      - name: Pack platform package
        shell: bash
        run: |
          ./scripts/stage-node-platform.sh "${{ matrix.target }}" "${{ matrix.native }}"
          mkdir -p dist/npm-pack
          npm pack --pack-destination dist/npm-pack "./dist/npm/${{ matrix.target }}"
      - uses: actions/upload-artifact@v7
        with:
          name: node-${{ matrix.target }}
          path: dist/npm-pack/*.tgz
          if-no-files-found: error

  node-wrapper:
    name: Node platform-selecting wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Assert wrapper contains no host binary
        run: |
          mkdir -p dist/npm-pack
          npm pack --pack-destination dist/npm-pack ./crates/aikit-node
          tar -tzf dist/npm-pack/*.tgz | grep -Fq package/index.js
          tar -tzf dist/npm-pack/*.tgz | grep -Fq package/index.d.ts
          if tar -tzf dist/npm-pack/*.tgz | grep -Eq '\.node$'; then
            echo 'root wrapper embeds a host-specific native addon' >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: node-wrapper
          path: dist/npm-pack/*.tgz
          if-no-files-found: error

  python-wheel:
    name: Python wheel (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest
            target: macos-arm64
          - os: macos-15-intel
            target: macos-x64
          - os: windows-latest
            target: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build ABI3 wheel
        run: |
          python -m pip install --disable-pip-version-check "maturin>=1.5,<2"
          python -m maturin build --manifest-path crates/aikit-py/Cargo.toml --release --locked --out dist/python
      - name: Install and import wheel
        shell: bash
        run: |
          python -m pip install --force-reinstall dist/python/*.whl
          python -c "import aikit; assert aikit.__version__ == '0.1.0'"
      - uses: actions/upload-artifact@v7
        with:
          name: python-${{ matrix.target }}
          path: dist/python/*.whl
          if-no-files-found: error

  assemble:
    name: Assemble and attest release bundle
    needs: [source, node-native, node-wrapper, python-wheel]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: dist/release
      - name: Verify complete target matrix and hash artifacts
        run: |
          test "$(find dist/release -name '*.whl' | wc -l)" -eq 5
          test "$(find dist/release -name '*.tgz' | wc -l)" -eq 6
          test "$(find dist/release -name '*.crate' | wc -l)" -eq 1
          find dist/release -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            | xargs -0 sha256sum > dist/release/SHA256SUMS
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/release/**/*.whl
            dist/release/**/*.tgz
            dist/release/**/*.crate
            dist/release/SHA256SUMS
      - uses: actions/upload-artifact@v7
        with:
          name: release-bundle
          path: dist/release
          if-no-files-found: error

  publish-guard:
    name: Signed-tag and publication authority guard
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: assemble
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: release-bundle
          path: dist/release
      - name: Require an annotated signed version tag
        shell: bash
        run: |
          version="$(awk -F'"' '/^version = "/ { print $2; exit }' Cargo.toml)"
          test "$GITHUB_REF_NAME" = "v$version"
          test "$(git cat-file -t "$GITHUB_REF_NAME")" = tag
          git config gpg.ssh.allowedSignersFile "$GITHUB_WORKSPACE/.github/allowed_signers"
          git verify-tag "$GITHUB_REF_NAME"
      - name: Require a complete committed evidence record
        run: ./scripts/release-check.sh --release
      - name: Recheck assembled artifact hashes
        run: |
          sha256sum --check dist/release/SHA256SUMS

  publish-node:
    name: Publish npm packages
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: publish-guard
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-bundle
          path: dist/release
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Require a trusted-publisher-capable npm CLI
        run: |
          npm install --global npm@11.18.0
          node --version
          npm --version
      - name: Publish native packages before the platform-selecting wrapper
        shell: bash
        env:
          # Needed only to bootstrap brand-new package names. Once all six packages exist,
          # configure npm Trusted Publishers and remove this environment secret.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          native_packages=()
          wrapper=""
          while IFS= read -r -d '' package; do
            name="$(tar -xOf "$package" package/package.json | node -e '
              let input = "";
              process.stdin.on("data", chunk => input += chunk);
              process.stdin.on("end", () => process.stdout.write(JSON.parse(input).name));
            ')"
            if [ "$name" = aikit-runtime ]; then
              wrapper="$package"
            else
              native_packages+=("$package")
            fi
          done < <(find dist/release -type f -name '*.tgz' -print0)
          test "${#native_packages[@]}" -eq 5
          for package in "${native_packages[@]}"; do
            npm publish "$package" --access public --provenance
          done
          test -n "$wrapper"
          npm publish "$wrapper" --access public --provenance

  publish-python:
    name: Publish Python wheels
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: publish-guard
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-bundle
          path: dist/release
      - name: Collect only Python distributions
        run: |
          mkdir dist/pypi
          find dist/release -type f -name '*.whl' -exec cp {} dist/pypi/ \;
          test "$(find dist/pypi -name '*.whl' | wc -l)" -eq 5
      - name: Publish through PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi

  publish-rust:
    name: Publish Rust crates
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: publish-guard
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish core crate
        run: cargo publish -p aikit-runtime-core --locked
      - name: Wait until the exact core version is visible
        shell: bash
        run: |
          version="$(awk -F'"' '/^version = "/ { print $2; exit }' Cargo.toml)"
          for attempt in {1..30}; do
            if curl --fail --silent --show-error \
              --user-agent 'aikit-release-workflow/0.1 (https://github.com/matakartal/aikit-runtime)' \
              "https://crates.io/api/v1/crates/aikit-runtime-core/$version" \
              >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "aikit-runtime-core@$version did not become visible in time" >&2
          exit 1
      - name: Package and verify facade against the published core
        shell: bash
        run: |
          version="$(awk -F'"' '/^version = "/ { print $2; exit }' Cargo.toml)"
          cargo package -p aikit-runtime --locked
          mkdir -p dist/rust-facade
          cp "target/package/aikit-runtime-$version.crate" dist/rust-facade/
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/rust-facade/*.crate
      - name: Publish facade crate
        run: cargo publish -p aikit-runtime --locked
      - uses: actions/upload-artifact@v7
        with:
          name: rust-facade-package
          path: dist/rust-facade/*.crate
          if-no-files-found: error

  node-registry-smoke:
    name: npm install (${{ matrix.os }})
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: publish-node
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Install from npm and load the native addon
        shell: bash
        run: |
          mkdir smoke && cd smoke
          npm init --yes
          for attempt in {1..30}; do
            if npm install --ignore-scripts "aikit-runtime@${GITHUB_REF_NAME#v}"; then
              break
            fi
            test "$attempt" -lt 30
            sleep 10
          done
          node -e "const aikit = require('aikit-runtime'); if (typeof aikit.Agent !== 'function') process.exit(1)"

  python-registry-smoke:
    name: PyPI install (${{ matrix.os }})
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: publish-python
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - name: Install the wheel from PyPI and import it
        shell: bash
        run: |
          for attempt in {1..30}; do
            if python -m pip install --disable-pip-version-check --only-binary=:all: \
              "aikit-runtime==${GITHUB_REF_NAME#v}"; then
              break
            fi
            test "$attempt" -lt 30
            sleep 10
          done
          python -c "import aikit; assert aikit.__version__ == '${GITHUB_REF_NAME#v}'"

  rust-registry-smoke:
    name: crates.io install
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: publish-rust
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - name: Resolve and compile the public facade from crates.io
        shell: bash
        run: |
          mkdir smoke && cd smoke
          cargo init --lib --name aikit_registry_smoke
          version="${GITHUB_REF_NAME#v}"
          printf '%s\n' 'pub fn compile_probe() { let _ = aikit::Agent::new(); }' > src/lib.rs
          for attempt in {1..30}; do
            if cargo add aikit-runtime@"=$version" && cargo check --locked; then
              exit 0
            fi
            cargo remove aikit-runtime 2>/dev/null || true
            test "$attempt" -lt 30
            sleep 10
          done
          exit 1

  github-release:
    name: Publish GitHub Release
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: [node-registry-smoke, python-registry-smoke, rust-registry-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: release-bundle
          path: dist/release
      - uses: actions/download-artifact@v8
        with:
          name: rust-facade-package
          path: dist/release/rust-facade-package
      - name: Create the immutable GitHub Release from the existing signed tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          mapfile -d '' files < <(find dist/release -type f -print0)
          gh release create "$GITHUB_REF_NAME" "${files[@]}" \
            --verify-tag \
            --title "aikit-runtime $version" \
            --notes-file "docs/releases/v$version.md"
