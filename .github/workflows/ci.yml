name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust strict gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Release-candidate metadata invariants
        run: ./scripts/release-check.sh --candidate
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (workspace, all targets and features)
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Tests (workspace, all features)
        run: cargo test --workspace --all-features --locked
      - name: Rustdoc warnings and doctests
        env:
          RUSTDOCFLAGS: -D warnings
        run: |
          # The Rust facade and Python extension intentionally share the lib name `aikit`, so
          # rustdoc them into separate output directories to avoid a filename collision.
          cargo doc -p aikit-runtime-core -p aikit-runtime -p aikit-node --all-features --no-deps --locked
          cargo doc -p aikit-py --all-features --no-deps --locked --target-dir target/doc-python
          cargo test -p aikit-runtime-core -p aikit-runtime --doc --all-features --locked

  msrv:
    name: Rust 1.88 MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
      - name: Check declared MSRV
        run: cargo check --workspace --all-targets --all-features --locked

  conformance:
    name: Rust, Python, and Node conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust public-surface conformance
        run: |
          cargo test -p aikit-runtime --locked
          cargo check -p aikit-runtime --examples --locked
      - name: Build Python binding
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --disable-pip-version-check \
            "maturin>=1.5,<2" "mypy==1.19.1" "pydantic==2.13.4"
          .venv/bin/maturin develop --manifest-path crates/aikit-py/Cargo.toml --locked
      - name: Python FFI and governed-agent scenarios
        run: |
          .venv/bin/python examples/python/spike.py
          .venv/bin/python examples/python/agent_governance.py
          .venv/bin/python examples/python/run_options.py
          .venv/bin/python examples/python/conformance.py
          .venv/bin/python crates/aikit-py/tests/subagent_context.py
          .venv/bin/python crates/aikit-py/tests/builtin_tools.py
          .venv/bin/python crates/aikit-py/tests/production_state.py
          .venv/bin/python crates/aikit-py/tests/multimodal_messages.py
          .venv/bin/mypy --strict crates/aikit-py/tests/typing_contract.py
      - name: Build Node binding
        run: ./scripts/build-node.sh
      - name: Install pinned Node runtime-test dependency
        run: >-
          npm install --prefix "$RUNNER_TEMP/aikit-node-test-deps"
          --no-save --package-lock=false --ignore-scripts zod@4.1.12
      - name: Node governed-agent and conformance scenarios
        env:
          NODE_PATH: ${{ runner.temp }}/aikit-node-test-deps/node_modules
        run: |
          node -e "const { z } = require('zod'); if (typeof z.toJSONSchema !== 'function') throw new Error('pinned Zod v4 did not load')"
          node examples/node/agent_governance.cjs
          node examples/node/run_options.cjs
          node examples/node/conformance.cjs
          node crates/aikit-node/tests/subagent-context.cjs
          node crates/aikit-node/tests/builtin-tools.cjs
          node crates/aikit-node/tests/production-state.cjs
          node crates/aikit-node/tests/multimodal-messages.cjs
          npx --yes --package typescript@5.9.3 tsc --noEmit --strict --target ES2020 \
            --module commonjs --moduleResolution node crates/aikit-node/tests/typing.ts
      - name: Canonical three-language parity
        env:
          PYTHON: .venv/bin/python
          NODE_PATH: ${{ runner.temp }}/aikit-node-test-deps/node_modules
        run: ./scripts/parity-check.sh

  node-native:
    name: Node native package (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: "18.17.0"
            target: linux-x64-gnu
            native: target/release/libaikit_node.so
          - os: ubuntu-24.04-arm
            node: "20"
            target: linux-arm64-gnu
            native: target/release/libaikit_node.so
          - os: macos-latest
            node: "20"
            target: darwin-arm64
            native: target/release/libaikit_node.dylib
          - os: macos-15-intel
            node: "20"
            target: darwin-x64
            native: target/release/libaikit_node.dylib
          - os: windows-latest
            node: "20"
            target: win32-x64-msvc
            native: target/release/aikit_node.dll
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release addon
        run: cargo build -p aikit-node --release --locked
      - name: Stage local checkout addon
        shell: bash
        run: |
          cp "${{ matrix.native }}" crates/aikit-node/aikit_node.node
      - name: Load native package
        run: >-
          node -e "const { Agent } = require('./crates/aikit-node');
          if (Number(process.versions.napi) < 9) throw new Error('Node runtime lacks N-API 9');
          const a = Agent.fromEnv({});
          if (!Array.isArray(a.activeProviders())) throw new Error('native addon smoke failed');"
      - name: Pack and load through optional platform dependency
        shell: bash
        run: ./scripts/test-node-package-layout.sh "${{ matrix.target }}" "${{ matrix.native }}"

  packages:
    name: Package dry-runs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust crates
        run: |
          cargo package -p aikit-runtime-core --allow-dirty --locked
          cargo package -p aikit-runtime-core --allow-dirty --list --locked > /tmp/aikit-core-package-files.txt
          grep -Fxq LICENSE-APACHE /tmp/aikit-core-package-files.txt
          grep -Fxq LICENSE-MIT /tmp/aikit-core-package-files.txt
          grep -Fxq README.md /tmp/aikit-core-package-files.txt
          # The facade depends on the exact core version, which is intentionally unpublished.
          # Check its publish file set now; full packaging becomes possible after core is staged.
          cargo package -p aikit-runtime --allow-dirty --list --locked > /tmp/aikit-package-files.txt
          grep -Fxq Cargo.toml /tmp/aikit-package-files.txt
          grep -Fxq LICENSE-APACHE /tmp/aikit-package-files.txt
          grep -Fxq LICENSE-MIT /tmp/aikit-package-files.txt
          grep -Fxq README.md /tmp/aikit-package-files.txt
          grep -Fxq src/lib.rs /tmp/aikit-package-files.txt
      - name: Python wheel
        run: |
          python -m pip install --disable-pip-version-check "maturin>=1.5,<2"
          maturin build --manifest-path crates/aikit-py/Cargo.toml --release --locked --out dist/python
          wheel="$(find dist/python -name '*.whl' -print -quit)"
          test -n "$wheel"
          unzip -l "$wheel" | grep -Eq 'aikit/__init__\.pyi$'
          unzip -l "$wheel" | grep -Eq 'aikit/py\.typed$'
          unzip -l "$wheel" | grep -Eq '/licenses/LICENSE-APACHE$'
          unzip -l "$wheel" | grep -Eq '/licenses/LICENSE-MIT$'
      - name: Node package
        run: |
          ./scripts/build-node.sh release
          npm pack --dry-run --json ./crates/aikit-node > /tmp/npm-pack.json
          grep -Fq '"path": "LICENSE-APACHE"' /tmp/npm-pack.json
          grep -Fq '"path": "LICENSE-MIT"' /tmp/npm-pack.json
          grep -Fq '"path": "README.md"' /tmp/npm-pack.json
          grep -Fq '"path": "index.d.ts"' /tmp/npm-pack.json
          grep -Fq '"path": "index.js"' /tmp/npm-pack.json
          if grep -Fq '"path": "aikit_node.node"' /tmp/npm-pack.json; then
            echo 'root npm wrapper must not embed one host-specific addon' >&2
            exit 1
          fi

  live-smoke-contract:
    name: Live smoke remains explicit and keyless CI skips it
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Ignored smoke test is not executed by normal CI
        run: cargo test -p aikit-runtime --test live_smoke --locked
      - name: Wrapper refuses calls without explicit acknowledgement
        shell: bash
        run: |
          set +e
          ./scripts/live-smoke.sh
          status=$?
          set -e
          test "$status" -eq 2
      - name: Full mode fails closed before calls when matrix is incomplete
        shell: bash
        run: |
          set +e
          env \
            -u ANTHROPIC_API_KEY -u OPENAI_API_KEY -u DEEPSEEK_API_KEY \
            -u GEMINI_API_KEY -u GOOGLE_API_KEY \
            -u AIKIT_SMOKE_ANTHROPIC_MODEL -u AIKIT_SMOKE_OPENAI_MODEL \
            -u AIKIT_SMOKE_DEEPSEEK_MODEL -u AIKIT_SMOKE_GOOGLE_MODEL \
            AIKIT_LIVE_SMOKE=1 AIKIT_LIVE_SMOKE_FULL=1 \
            ./scripts/live-smoke.sh > /tmp/full-smoke-contract.log 2>&1
          status=$?
          set -e
          test "$status" -ne 0
          grep -Fq 'requires the complete four-provider matrix before any live call' \
            /tmp/full-smoke-contract.log
