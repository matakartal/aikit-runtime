name: A2A conformance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a2a-conformance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  official-tck:
    name: Official A2A TCK (JSON-RPC MUST)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: "1.97.1"
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.10.12"
      - name: Build deterministic localhost SUT
        run: cargo build -p aikit-runtime-core --example a2a_tck_sut --locked
      - name: Run pinned official JSON-RPC MUST suite
        env:
          AIKIT_A2A_SUT_URL: http://127.0.0.1:9999
          AIKIT_A2A_TCK_LEVEL: must
          AIKIT_A2A_TCK_REPORT_DIR: ${{ runner.temp }}/a2a-tck-report
          AIKIT_A2A_TCK_VERIFIED_WAIVERS: "1"
        run: |
          set -euo pipefail
          target/debug/examples/a2a_tck_sut >"$RUNNER_TEMP/a2a-tck-sut.log" 2>&1 &
          sut_pid=$!
          cleanup() {
            kill "$sut_pid" 2>/dev/null || true
            wait "$sut_pid" 2>/dev/null || true
          }
          trap cleanup EXIT
          trap 'exit 130' INT
          trap 'exit 143' TERM

          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error \
              http://127.0.0.1:9999/.well-known/agent-card.json \
              >"$RUNNER_TEMP/a2a-agent-card.json"; then
              if ! kill -0 "$sut_pid" 2>/dev/null; then
                cat "$RUNNER_TEMP/a2a-tck-sut.log" >&2
                exit 1
              fi
              break
            fi
            if ! kill -0 "$sut_pid" 2>/dev/null; then
              cat "$RUNNER_TEMP/a2a-tck-sut.log" >&2
              exit 1
            fi
            if test "$attempt" = 60; then
              cat "$RUNNER_TEMP/a2a-tck-sut.log" >&2
              exit 1
            fi
            sleep 1
          done

          ./scripts/a2a-conformance.sh
      - name: Upload A2A TCK report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: a2a-tck-jsonrpc-must
          path: |
            ${{ runner.temp }}/a2a-tck-report
            ${{ runner.temp }}/a2a-agent-card.json
            ${{ runner.temp }}/a2a-tck-sut.log
          if-no-files-found: warn
          retention-days: 14
