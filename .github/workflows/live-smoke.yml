name: live-smoke

on:
  workflow_dispatch:
    inputs:
      anthropic_model:
        description: Exact Anthropic model id to accept for this release
        required: true
        type: string
      openai_model:
        description: Exact OpenAI model id to accept for this release
        required: true
        type: string
      deepseek_model:
        description: Exact DeepSeek model id to accept for this release
        required: true
        type: string
      google_model:
        description: Exact Google model id to accept for this release
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: live-smoke-${{ github.sha }}
  cancel-in-progress: false

jobs:
  four-provider-contract:
    name: Four-provider billable contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: "1.97.1"
      - name: Build the smoke-test binary without provider secrets
        id: build
        shell: bash
        run: |
          cargo test -p aikit-runtime --test live_smoke --locked --no-run
          binary="$(find target/debug/deps -maxdepth 1 -type f -name 'live_smoke-*' -perm -111 -print -quit)"
          test -n "$binary"
          printf 'binary=%s\n' "$binary" >> "$GITHUB_OUTPUT"
      - name: Resolve the full secret/model matrix before the first request
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          AIKIT_SMOKE_ANTHROPIC_MODEL: ${{ inputs.anthropic_model }}
          AIKIT_SMOKE_OPENAI_MODEL: ${{ inputs.openai_model }}
          AIKIT_SMOKE_DEEPSEEK_MODEL: ${{ inputs.deepseek_model }}
          AIKIT_SMOKE_GOOGLE_MODEL: ${{ inputs.google_model }}
          AIKIT_LIVE_SMOKE: "1"
          AIKIT_LIVE_SMOKE_FULL: "1"
          AIKIT_LIVE_SMOKE_BIN: ${{ steps.build.outputs.binary }}
        run: ./scripts/live-smoke.sh
      - name: Write a secret-free evidence artifact
        shell: bash
        env:
          ANTHROPIC_MODEL: ${{ inputs.anthropic_model }}
          OPENAI_MODEL: ${{ inputs.openai_model }}
          DEEPSEEK_MODEL: ${{ inputs.deepseek_model }}
          GOOGLE_MODEL: ${{ inputs.google_model }}
        run: |
          mkdir -p dist
          {
            printf 'commit_sha=%s\n' "$GITHUB_SHA"
            printf 'run_url=%s/%s/actions/runs/%s\n' "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID"
            printf 'tested_at_utc=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            printf 'anthropic_model=%s\n' "$ANTHROPIC_MODEL"
            printf 'openai_model=%s\n' "$OPENAI_MODEL"
            printf 'deepseek_model=%s\n' "$DEEPSEEK_MODEL"
            printf 'google_model=%s\n' "$GOOGLE_MODEL"
            printf 'text=passed\nobject=passed\ngoverned_deny=passed\ntwo_request_replay=passed\n'
          } > dist/live-smoke-evidence.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: live-smoke-evidence
          path: dist/live-smoke-evidence.txt
          if-no-files-found: error
