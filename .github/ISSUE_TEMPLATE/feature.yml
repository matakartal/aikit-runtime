name: Feature request
description: Propose a scoped capability or API improvement.
title: "[feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What concrete user or agent workflow is blocked?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Include the Rust/Python/Node shape if this is a public API.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Safety and fidelity boundaries
      description: How should permissions, provider differences, budgets, audit, and failure work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and post-v1 deferred items.
          required: true
