name: Bug report
description: Report a reproducible aikit defect.
title: "[bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include API keys, private prompts, or vulnerability details. Follow SECURITY.md for vulnerabilities.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: commit SHA, crate/package version
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Rust
        - Python
        - Node.js / TypeScript
        - Provider adapter
        - Governance / containment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Prefer a keyless mock-provider reproduction. Redact all secrets.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, architecture, Rust/Python/Node versions, provider and model if relevant
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed credentials and private data.
          required: true
        - label: This is not a vulnerability report.
          required: true
