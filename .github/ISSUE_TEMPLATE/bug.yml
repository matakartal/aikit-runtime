name: Bug report
description: Report a reproducible aikit defect.
title: "[bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do **not** include API keys, private prompts, or vulnerability details.
        Security issues: [private advisory form](https://github.com/matakartal/aikit-runtime/security/advisories/new).
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Prefer a full commit SHA for unpublished candidates.
      placeholder: e.g. a1eb362 or aikit-runtime 0.1.0
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Rust
        - Python
        - Node.js / TypeScript
        - Provider adapter
        - Governance / permissions / hooks
        - Containment / built-in tools
        - Sessions / memory / audit
        - Documentation
        - Other
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Impact
      options:
        - Blocks production use
        - Incorrect behavior with workaround
        - Docs / DX only
        - Unsure
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened, including the safety or fidelity boundary if relevant.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead. Redact secrets.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Prefer a keyless mock-provider reproduction. Include commands and a short code snippet.
      placeholder: |
        cargo run -p aikit-runtime --example quickstart
        # or a minimal Python / Node snippet
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, architecture, Rust/Python/Node versions, provider and model if relevant
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed credentials and private data.
          required: true
        - label: This is not a vulnerability report (those use the private advisory form).
          required: true
