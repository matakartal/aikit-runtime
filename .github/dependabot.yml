version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels: [dependencies, rust]
    commit-message:
      prefix: "deps(rust)"

  - package-ecosystem: pip
    directory: /crates/aikit-py
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels: [dependencies, python]
    commit-message:
      prefix: "deps(python)"

  - package-ecosystem: npm
    directory: /crates/aikit-node
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels: [dependencies, nodejs]
    commit-message:
      prefix: "deps(node)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:45"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    commit-message:
      prefix: "deps(actions)"
